services:
  - type: web
    name: ayurherb-backend
    env: node
    region: oregon
    rootDirectory: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://frontend-five-bay-68.vercel.app
